<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Name}} - NewsForNerds</title>
    <link rel="stylesheet" href="/static/dist/app.css">
    <link rel="stylesheet" href="/static/style.css?v=9">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
</head>
<body>
    <div id="app" 
         data-page-id="{{.ID}}" 
         data-page-name="{{.Name}}"
         data-bg-color="{{derefString .BgColor}}" 
         data-bg-image="{{derefString .BgImage}}"
         data-config="{{.Config}}"
         data-is-owner="{{.IsOwner}}"
         data-is-public="{{if .IsPublic}}{{.IsPublic}}{{else}}0{{end}}"
         data-slug="{{derefString .Slug}}"
         data-slug-access="{{if .SlugAccess}}{{derefInt64 .SlugAccess}}{{else}}0{{end}}">
        <!-- Svelte app will mount here -->
        <div style="display: flex; align-items: center; justify-content: center; height: 100vh; color: #888;">
            Loading...
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
    <script type="module" src="/static/dist/app.js"></script>
</body>
</html>
